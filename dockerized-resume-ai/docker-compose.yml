version: "3.9"

services:
  resume-analyzer:
    build: .
    container_name: resume_analyzer_app
    ports:
      - "5000:5000"

    networks:
      - app_bridge

    volumes:
      - ./uploads:/app/uploads
      - ./models_cache:/app/models_cache

    environment:
      - FLASK_ENV=development
      - TRANSFORMERS_CACHE=/app/models_cache

    restart: unless-stopped


networks:
  app_bridge:
    driver: bridge
